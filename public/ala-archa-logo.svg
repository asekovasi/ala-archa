<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#gradient)" stroke="#ffffff" stroke-width="3"/>
  
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#10b981;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Mountain silhouette -->
  <path d="M 50 150 L 80 100 L 100 120 L 120 80 L 150 150 Z" fill="#ffffff" opacity="0.9"/>
  
  <!-- Tree (Archa/Juniper) -->
  <path d="M 100 150 L 90 130 L 100 120 L 110 130 Z" fill="#ffffff" opacity="0.8"/>
  <path d="M 100 140 L 85 125 L 100 115 L 115 125 Z" fill="#ffffff" opacity="0.8"/>
  
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">АЛА-АРЧА</text>
</svg>

